<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Gerador de Desculpas logo">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0ea5a4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#071123" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="120" height="120" rx="24" fill="url(#g1)" filter="url(#shadow)"/>

  <g transform="translate(18,20)">
    <text x="42" y="48" font-family="Playfair Display, serif" font-size="46" font-weight="700" fill="#071123" text-anchor="middle" dominant-baseline="middle">G</text>
    <text x="74" y="76" font-family="Playfair Display, serif" font-size="46" font-weight="700" fill="#071123" text-anchor="middle" dominant-baseline="middle" opacity="0.9">D</text>
  </g>

  <text x="60" y="106" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#071123" text-anchor="middle" letter-spacing="1">Gerador de Desculpas</text>
</svg>
